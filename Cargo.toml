[package]
name = "cargo-fixture"
version = "0.9.0"
authors = ["Vojtech Kral"]
description = "FIXME: descr"
license = "Apache-2.0"
keywords = ["rust", "cargo", "testing"] # TODO: more?
edition = "2021"

[[bin]]
name = "cargo-fixture"

[dependencies]
anyhow = "1"
async-ctrlc = "1.2.0"
clap = { version = "4.4", default-features = false, features = ["std", "help", "usage", "error-context", "derive"] }
futures-util = "0.3.29"
log = "0.4"
os_str_bytes = "6.6"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
smol = "1.3.0"
stderrlog = "0.5"

cargo-fixture-lib = { path = "crates/lib" }

[workspace]
members = [
    "crates/lib",
    "crates/macros",
    "example",
    "scratch/pk", # FIXME: tmp
]
