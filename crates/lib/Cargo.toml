[package]
name = "cargo-fixture-lib"
version = "0.1.1"
authors = ["Vojtech Kral"]
description = "FIXME: descr"
license = "Apache-2.0"
keywords = ["rust", "cargo", "testing"] # TODO: more?
edition = "2021"

# TODO: ensure deps shared with binary have same versions

[lib]
name = "cargo_fixture"
path = "src/lib.rs"

[dependencies]
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
cargo-fixture-macros = { path = "../macros" }  # FIXME: from crates
